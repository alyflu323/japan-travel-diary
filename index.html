<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#cf4636" />
<title>Japan Travel Diary · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --ink:#2c2a33;
    --ink-soft:#5d5a64;
    --muted:#9b97a1;
    --paper:#f5f3ed;
    --paper-2:#ffffff;
    --line:#e8e4da;
    --accent:#cf4636;        /* rojo japonés */
    --accent-deep:#a8392c;
    --indigo:#46578a;        /* azul transporte */
    --gold:#c39a4a;
    --soft:#efece4;
    --shadow:0 10px 24px -18px rgba(60,50,40,.40);
    --r:16px;
    /* colores por categoría (barrita izquierda) */
    --c-transport:#46578a;
    --c-hotel:#7b8190;
    --c-food:#d2902f;
    --c-nature:#5a9367;
    --c-shop:#8a6aa0;
    --c-spot:#cf4636;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;font-family:"Zen Kaku Gothic New",system-ui,sans-serif;color:var(--ink);
    background-color:var(--paper);min-height:100vh;line-height:1.5;padding-bottom:env(safe-area-inset-bottom);
  }

  header{position:sticky;top:0;z-index:30;background:rgba(245,243,237,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 11px) 16px 0;}
  .brand{display:flex;align-items:center;gap:11px;justify-content:center;max-width:760px;margin:0 auto;}
  .seal{flex:none;width:36px;height:36px;border-radius:10px;background:var(--accent);color:#fff;display:grid;place-items:center;font-family:"Shippori Mincho B1",serif;font-weight:800;font-size:19px;box-shadow:0 4px 10px -4px rgba(168,57,44,.5);}
  .brandtxt small{display:block;font-weight:700;font-size:9.5px;letter-spacing:2.4px;text-transform:uppercase;color:var(--accent);}
  .brandtxt h1{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:clamp(22px,6vw,28px);margin:1px 0 0;letter-spacing:.3px;color:var(--ink);}

  nav{max-width:760px;margin:11px auto 0;display:flex;gap:8px;overflow-x:auto;padding:0 2px 11px;scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none;}
  .tab{flex:none;border:1px solid var(--line);background:var(--paper-2);border-radius:12px;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:9px;color:var(--ink-soft);transition:.2s;font-size:13px;}
  .tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .tab .d-num{font-weight:700;font-size:13px;line-height:1;color:var(--ink);}
  .tab .d-sub{font-size:10px;color:var(--muted);letter-spacing:.4px;}
  .tab.active{background:#fff;border-color:var(--accent);box-shadow:0 4px 12px -8px rgba(207,70,54,.6);}
  .ring{flex:none;}
  .ring text{font-weight:700;fill:var(--ink-soft);}

  main{max-width:760px;margin:0 auto;padding:18px 16px 60px;}
  .day{display:none;animation:fade .4s ease both;}
  .day.show{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .intro{text-align:center;padding:12px 6px 18px;}
  .eyebrow{font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700;}
  .intro h2{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:clamp(23px,6.4vw,31px);margin:6px 0 4px;line-height:1.15;color:var(--ink);}
  .intro .date{font-size:12.5px;color:var(--muted);}
  .quote{font-family:"Shippori Mincho B1",serif;font-style:italic;font-weight:500;color:var(--ink-soft);font-size:14px;max-width:30em;margin:14px auto 0;position:relative;padding:0 16px;}
  .quote::before,.quote::after{color:var(--accent);font-size:24px;font-style:normal;line-height:0;position:relative;top:7px;opacity:.6;}
  .quote::before{content:"\201C";margin-right:2px;}
  .quote::after{content:"\201D";margin-left:2px;}

  .progress{max-width:420px;margin:16px auto 4px;}
  .progress .bar{height:8px;border-radius:99px;background:var(--line);overflow:hidden;}
  .progress .fill{height:100%;width:0;border-radius:99px;background:var(--accent);transition:width .5s cubic-bezier(.4,1.3,.5,1);}
  .progress .lbl{display:flex;justify-content:space-between;margin-top:7px;font-size:12px;color:var(--muted);}
  .progress .lbl b{color:var(--accent);}

  .list{margin-top:22px;}

  .card{position:relative;background:var(--paper-2);border:1px solid var(--line);border-left:4px solid var(--c-spot);border-radius:var(--r);margin-bottom:11px;box-shadow:var(--shadow);transition:background .25s,border-color .25s,box-shadow .25s;}
  .card.done{background:#f7f5ef;box-shadow:none;}

  .card-row{display:flex;align-items:stretch;}
  .htap{flex:1;min-width:0;display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px 4px 12px 13px;background:none;border:none;text-align:left;color:inherit;font:inherit;border-radius:var(--r);}
  .htap:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;}
  .time{flex:none;font-weight:700;font-size:11px;color:#fff;background:#3a3742;border-radius:7px;padding:3px 7px;letter-spacing:.3px;min-width:46px;text-align:center;}
  .time.soft{background:var(--soft);color:var(--ink-soft);}
  .emoji{font-size:18px;flex:none;}
  .ttl{flex:1;min-width:0;}
  .ttl h3{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:15px;margin:0;line-height:1.25;color:var(--ink);}
  .ttl .stars{color:var(--gold);font-size:10px;letter-spacing:1px;margin-left:5px;}
  .ttl .idea{font-size:11.5px;color:var(--ink-soft);margin-top:1px;line-height:1.3;}
  .card.done .ttl .idea{color:var(--muted);}
  .chev{flex:none;color:var(--muted);transition:transform .3s ease;margin-right:10px;}
  .card.open .chev,.block.open .chev{transform:rotate(180deg);}

  .detail{overflow:hidden;max-height:0;transition:max-height .34s ease;}
  .card.open .detail,.block.open .detail{max-height:1600px;}
  .detail-inner{min-height:0;}
  .card .detail-inner{padding:2px 16px 13px 53px;}

  .desc{margin:0;font-size:13px;color:var(--ink-soft);}
  .lore{margin-top:9px;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:8px 11px;}
  .lore .lh{display:block;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:3px;}
  .lore p{margin:0;font-size:12px;color:var(--ink-soft);}
  .tips{list-style:none;padding:0;margin:9px 0 0;display:flex;flex-direction:column;gap:6px;}
  .tips li{font-size:12.5px;color:var(--ink-soft);display:flex;gap:8px;align-items:flex-start;}
  .tips li .ti{flex:none;}

  .stamp{flex:none;width:52px;border:none;background:none;cursor:pointer;position:relative;display:grid;place-items:center;}
  .stamp .ph{width:30px;height:30px;border-radius:9px;border:2px solid var(--line);transition:.2s;}
  .stamp .ink{position:absolute;width:30px;height:30px;border-radius:9px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:17px;opacity:0;transform:scale(.2) rotate(-20deg);transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .2s;box-shadow:0 4px 9px -4px rgba(168,57,44,.6);}
  .stamp .ink::after{content:"\2713";}
  .card.done .stamp .ph{opacity:0;}
  .card.done .stamp .ink{opacity:1;transform:scale(1) rotate(-6deg);}
  .stamp:focus-visible{outline:2px solid var(--accent);outline-offset:-4px;border-radius:14px;}
  .stamp:active .ink{transform:scale(.9) rotate(-6deg);}
  .card.done .ttl h3{text-decoration:line-through;text-decoration-color:rgba(168,57,44,.4);text-decoration-thickness:1.5px;color:var(--muted);}
  .card.done .emoji{filter:grayscale(.5);opacity:.6;}

  .block{position:relative;background:var(--paper-2);border:1px solid var(--line);border-left:4px solid var(--c-hotel);border-radius:var(--r);margin-bottom:11px;box-shadow:var(--shadow);overflow:hidden;}
  .block.todo{border-left-color:var(--c-spot);}
  .bhead{width:100%;display:flex;align-items:center;gap:10px;cursor:pointer;background:none;border:none;text-align:left;color:inherit;font:inherit;padding:13px 15px;}
  .bhead:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;}
  .bhead .emoji{font-size:17px;}
  .bhead h4{font-family:"Shippori Mincho B1",serif;font-size:14.5px;margin:0;flex:1;color:var(--ink);}
  .count{font-size:11.5px;font-weight:700;color:var(--accent);background:var(--soft);border-radius:99px;padding:2px 9px;}
  .count.full{color:#fff;background:var(--accent);}
  .block .detail-inner{padding:0 15px 7px;}
  .micro{display:flex;flex-direction:column;gap:2px;}
  .micro button{display:flex;align-items:center;gap:11px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:13.5px;color:var(--ink-soft);padding:8px 2px;text-align:left;width:100%;border-radius:8px;}
  .micro button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .micro .box{flex:none;width:21px;height:21px;border-radius:6px;border:2px solid var(--line);display:grid;place-items:center;transition:.2s;color:#fff;font-size:12px;}
  .micro button[aria-pressed="true"] .box{background:var(--accent);border-color:var(--accent);}
  .micro button[aria-pressed="true"] .box::after{content:"\2713";}
  .micro button[aria-pressed="true"] .txt{text-decoration:line-through;color:var(--muted);}

  /* diario */
  .journal{margin-top:30px;border-radius:20px;padding:2px;background:linear-gradient(160deg,var(--indigo),var(--accent));box-shadow:0 14px 30px -22px rgba(60,40,40,.6);}
  .journal-in{background:var(--paper-2);border-radius:18px;padding:16px 15px 18px;}
  .journal-h{text-align:center;font-family:"Shippori Mincho B1",serif;font-size:17px;margin:2px 0 2px;color:var(--ink);}
  .journal-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:14px;}
  .jcard{background:#faf8f3;border:1px solid var(--line);border-radius:13px;padding:12px 13px;margin-bottom:11px;}
  .jcard .jt{display:flex;align-items:center;gap:8px;font-family:"Shippori Mincho B1",serif;font-size:13.5px;font-weight:700;margin-bottom:8px;color:var(--ink);}
  .jcard .qtext{font-size:13px;color:var(--ink-soft);margin:0 0 9px;line-height:1.45;}
  textarea,input.fld{width:100%;font-family:inherit;font-size:13px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 10px;resize:vertical;}
  textarea:focus,input.fld:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(207,70,54,.12);}
  textarea{min-height:60px;}
  .mfield{margin-bottom:9px;}
  .mfield:last-child{margin-bottom:0;}
  .mfield label{display:block;font-size:11px;font-weight:700;color:var(--accent-deep);margin-bottom:4px;letter-spacing:.3px;}

  .photo-zone{display:block;border:2px dashed var(--muted);border-radius:11px;padding:18px;text-align:center;cursor:pointer;color:var(--ink-soft);font-size:12.5px;background:#fff;transition:.2s;}
  .photo-zone:hover{background:var(--soft);}
  .photo-wrap{border-radius:11px;overflow:hidden;line-height:0;}
  .photo-wrap img{width:100%;display:block;}
  .photo-rm{display:block;margin:9px auto 0;background:var(--soft);color:var(--ink-soft);border:none;border-radius:99px;font-size:11.5px;padding:7px 15px;cursor:pointer;font-family:inherit;}
  .photo-rm:hover{background:#e7e3d8;}
  .hidden-file{display:none;}

  .hearts{display:flex;gap:6px;justify-content:center;}
  .hearts button{background:none;border:none;cursor:pointer;font-size:25px;line-height:1;padding:2px;filter:grayscale(1);opacity:.45;transition:transform .15s,opacity .15s,filter .15s;}
  .hearts button.on{filter:none;opacity:1;}
  .hearts button:active{transform:scale(1.25);}
  .hearts button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;}

  .expenses{margin-top:14px;background:var(--paper-2);border:1px solid var(--line);border-left:4px solid var(--c-food);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 15px;}
  .et{display:flex;align-items:center;gap:8px;font-family:"Shippori Mincho B1",serif;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px;}
  .exp-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
  .exp-c{flex:1;min-width:0;font-size:13px;color:var(--ink);overflow-wrap:anywhere;}
  .exp-a{font-weight:700;font-size:13px;color:var(--ink);white-space:nowrap;}
  .exp-del{flex:none;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:3px 5px;border-radius:6px;}
  .exp-del:hover{color:var(--accent);background:var(--soft);}
  .exp-empty{font-size:12.5px;color:var(--muted);padding:2px 0 4px;}
  .exp-add{display:flex;gap:6px;margin-top:11px;}
  .exp-cin{flex:1;min-width:0;font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fff;color:var(--ink);}
  .exp-ain{width:72px;flex:none;font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:9px;padding:9px 8px;background:#fff;color:var(--ink);text-align:right;}
  .exp-cin:focus,.exp-ain:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(207,70,54,.12);}
  .addbtn{flex:none;width:42px;border:none;border-radius:9px;background:var(--accent);color:#fff;font-size:20px;line-height:1;cursor:pointer;}
  .addbtn:active{transform:scale(.94);}
  .exp-total{display:flex;justify-content:space-between;margin-top:12px;font-weight:700;font-size:14px;color:var(--ink);}
  .exp-trip{font-size:11px;color:var(--muted);text-align:right;margin-top:3px;}

  .day-foot{margin-top:22px;display:flex;flex-direction:column;gap:13px;align-items:center;text-align:center;}
  .ratings{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;font-size:12px;color:var(--ink-soft);}
  .ratings span b{color:var(--gold);letter-spacing:1px;}
  .next{font-size:12.5px;color:var(--ink-soft);background:var(--paper-2);border:1px solid var(--line);border-radius:13px;padding:12px 16px;max-width:34em;}
  .next b{color:var(--accent);}
  .reset{background:none;border:1px solid var(--line);color:var(--muted);font-size:12px;border-radius:99px;padding:7px 16px;cursor:pointer;transition:.2s;}
  .reset:hover{border-color:var(--accent);color:var(--accent);}
  .note{text-align:center;font-size:11px;color:var(--muted);max-width:30em;margin:22px auto 0;line-height:1.6;}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto;}}

  .seg{display:flex;gap:6px;justify-content:center;margin:16px auto 0;max-width:280px;}
  .seg button{flex:1;border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);border-radius:11px;padding:8px 0;font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;}
  .seg button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .seg button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .daymap{height:360px;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);margin-top:16px;box-shadow:var(--shadow);background:#eee;}
  .daymap .leaflet-popup-content{font-family:"Zen Kaku Gothic New",sans-serif;font-size:13px;}
  .map-legend{display:flex;flex-wrap:wrap;gap:7px 13px;justify-content:center;margin-top:12px;font-size:11.5px;color:var(--ink-soft);}
  .map-legend span{display:inline-flex;align-items:center;gap:5px;}
  .map-legend i{width:10px;height:10px;border-radius:50%;display:inline-block;border:1.5px solid #fff;box-shadow:0 0 0 1px var(--line);}
  .maplbl{background:rgba(255,255,255,.93);border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-family:"Zen Kaku Gothic New",sans-serif;font-size:10px;font-weight:700;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.14);white-space:normal;max-width:130px;line-height:1.2;text-align:center;}
  .maplbl:before{display:none!important;}

  /* cuenta atrás */
  .cd{margin:6px 0 16px;background:linear-gradient(135deg,var(--accent),var(--accent-deep));border-radius:20px;padding:18px 16px;text-align:center;color:#fff;box-shadow:0 14px 30px -18px rgba(168,57,44,.7);}
  .cd-lbl{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;opacity:.92;font-weight:700;}
  .cd-days{font-family:"Shippori Mincho B1",serif;font-size:46px;font-weight:800;line-height:1;margin:5px 0 3px;}
  .cd-days small{font-size:16px;font-weight:700;opacity:.95;}
  .cd-hms{font-size:13px;opacity:.92;font-variant-numeric:tabular-nums;letter-spacing:.5px;}
  .cd-sub{font-size:12px;opacity:.95;margin-top:7px;}

  /* dato curioso */
  .fact{background:var(--paper-2);border:1px solid var(--line);border-left:4px solid var(--c-nature);border-radius:var(--r);padding:14px 15px;margin-bottom:16px;box-shadow:var(--shadow);}
  .fact .ft{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:14px;margin-bottom:7px;}
  .fact p{margin:0 0 11px;font-size:13px;color:var(--ink-soft);line-height:1.5;}
  .fact button{background:var(--soft);border:none;border-radius:99px;padding:8px 15px;font-family:inherit;font-size:12px;font-weight:700;color:var(--accent-deep);cursor:pointer;}
  .fact button:hover{background:#e7e3d8;}

  /* resumen */
  .sm-stats{display:flex;gap:9px;margin:8px 0 18px;}
  .sm-stat{flex:1;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:12px 6px;text-align:center;box-shadow:var(--shadow);}
  .sm-stat b{display:block;font-family:"Shippori Mincho B1",serif;font-size:16px;color:var(--accent);}
  .sm-stat span{font-size:10px;color:var(--muted);}
  .sm-card{background:var(--paper-2);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:var(--r);padding:13px 14px;margin-bottom:11px;box-shadow:var(--shadow);}
  .sm-head{display:flex;justify-content:space-between;align-items:center;}
  .sm-day{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);}
  .sm-spent{font-weight:700;font-size:13px;color:var(--ink);}
  .sm-title{font-family:"Shippori Mincho B1",serif;font-size:15px;font-weight:700;margin:2px 0 6px;}
  .sm-hearts{font-size:14px;letter-spacing:1px;}
  .sm-dim{font-size:11.5px;color:var(--muted);font-style:italic;letter-spacing:0;}
  .sm-photo{width:100%;border-radius:11px;margin-top:10px;display:block;}
  .sm-mems{margin-top:9px;display:flex;flex-direction:column;gap:4px;}
  .sm-mem{font-size:12px;color:var(--ink-soft);}
  .sm-mem b{color:var(--accent-deep);}
  .sm-grand{text-align:center;font-family:"Shippori Mincho B1",serif;font-size:15px;margin:6px 0 2px;color:var(--ink);}
  .sm-grand b{color:var(--accent);}

  /* gráfico gasto por día */
  .spend{margin:4px 0 6px;}
  .spend-row{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
  .spend-row .lab{width:30px;font-size:11px;font-weight:700;color:var(--ink-soft);flex:none;}
  .spend-row .track{flex:1;background:var(--line);border-radius:99px;height:13px;overflow:hidden;}
  .spend-row .barfill{height:100%;background:var(--accent);border-radius:99px;min-width:2px;}
  .spend-row .val{width:66px;text-align:right;font-size:11px;font-weight:700;color:var(--ink);flex:none;}

  /* álbum de fotos */
  .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
  .gallery figure{margin:0;border-radius:11px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);position:relative;}
  .gallery img{width:100%;height:108px;object-fit:cover;display:block;}
  .gallery figcaption{position:absolute;left:0;right:0;bottom:0;padding:4px 7px;font-size:9.5px;font-weight:700;color:#fff;background:linear-gradient(to top,rgba(0,0,0,.6),transparent);}
  .gallery-empty{font-size:12.5px;color:var(--muted);text-align:center;padding:12px;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);}

  /* regalos */
  .gifts{background:var(--paper-2);border:1px solid var(--line);border-left:4px solid var(--c-shop);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 15px;margin-bottom:16px;}
  .gift-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
  .gift-row:last-of-type{border-bottom:none;}
  .gift-chk{flex:none;width:21px;height:21px;border-radius:6px;border:2px solid var(--line);background:#fff;cursor:pointer;display:grid;place-items:center;color:#fff;font-size:12px;padding:0;}
  .gift-row.done .gift-chk{background:var(--c-nature);border-color:var(--c-nature);}
  .gift-row.done .gift-chk::after{content:"✓";}
  .gift-t{flex:1;min-width:0;font-size:13px;color:var(--ink);overflow-wrap:anywhere;}
  .gift-row.done .gift-t{text-decoration:line-through;color:var(--muted);}
  .gift-a{font-size:12px;font-weight:700;color:var(--ink-soft);white-space:nowrap;}
  .gift-del{flex:none;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:3px 5px;border-radius:6px;}
  .gift-del:hover{color:var(--accent);background:var(--soft);}

  /* japonés: chuleta */
  .ph-cat{font-family:"Shippori Mincho B1",serif;font-size:13px;font-weight:700;color:var(--accent);margin:18px 0 7px;letter-spacing:.3px;}
  .ph-list{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
  .ph-row{padding:10px 14px;border-bottom:1px solid var(--line);}
  .ph-row:last-child{border-bottom:none;}
  .ph-es{font-size:12px;color:var(--muted);}
  .ph-ro{font-family:"Shippori Mincho B1",serif;font-size:15px;font-weight:700;color:var(--ink);margin-top:1px;}
  .ph-say{font-size:12px;color:var(--ink-soft);font-style:italic;margin-top:1px;}

  /* reto de pareja */
  .quiz{background:var(--paper-2);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:16px 15px;}
  .quiz-h{text-align:center;font-family:"Shippori Mincho B1",serif;font-size:16px;margin:0 0 2px;color:var(--ink);}
  .quiz-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:14px;}
  .scoreboard{display:flex;gap:10px;margin-bottom:14px;}
  .score{flex:1;border-radius:14px;padding:10px;text-align:center;border:2px solid var(--line);background:#fff;transition:.2s;}
  .score.alyssa{border-color:#eab4c7;} .score.pol{border-color:#aebada;}
  .score.turn.alyssa{box-shadow:0 0 0 3px rgba(196,78,126,.15);border-color:#c44e7e;}
  .score.turn.pol{box-shadow:0 0 0 3px rgba(79,106,163,.15);border-color:#4f6aa3;}
  .score .nm{font-size:12px;font-weight:700;}
  .score.alyssa .nm{color:#c44e7e;} .score.pol .nm{color:#4f6aa3;}
  .score .pts{font-family:"Shippori Mincho B1",serif;font-size:27px;font-weight:800;color:var(--ink);line-height:1;margin-top:2px;}
  .turnlbl{text-align:center;font-size:13.5px;font-weight:700;color:var(--ink-soft);margin-bottom:11px;}
  .q-prompt{text-align:center;font-size:15px;color:var(--ink);margin-bottom:13px;line-height:1.4;}
  .q-prompt b{color:var(--accent-deep);}
  .opts{display:flex;flex-direction:column;gap:8px;}
  .opt{border:1px solid var(--line);background:#fff;border-radius:11px;padding:11px 13px;font-family:inherit;font-size:13.5px;color:var(--ink);text-align:left;cursor:pointer;transition:.15s;}
  .opt:hover{border-color:var(--accent);}
  .opt.correct{background:#e8f4ea;border-color:#5a9367;color:#2f6b46;font-weight:700;}
  .opt.wrong{background:#fbe9e7;border-color:#cf4636;color:#a8392c;}
  .q-next{display:block;width:100%;margin-top:6px;border:none;border-radius:11px;background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:700;padding:11px;cursor:pointer;}
  .quiz-start{display:block;width:100%;border:none;border-radius:11px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;padding:12px;cursor:pointer;font-family:inherit;}
  .q-reset{display:block;margin:11px auto 0;background:none;border:1px solid var(--line);color:var(--muted);border-radius:99px;font-size:11.5px;padding:6px 14px;cursor:pointer;font-family:inherit;}

  /* portada */
  .cover{position:relative;border-radius:18px;overflow:hidden;margin:6px 0 16px;box-shadow:0 12px 28px -20px rgba(0,0,0,.45);border:1px solid var(--line);}
  .cover img{width:100%;height:auto;display:block;filter:saturate(.88) brightness(.95) contrast(1.02);}
  .cover-ov{position:absolute;inset:0;background:linear-gradient(180deg, rgba(38,24,24,.34) 0%, rgba(38,24,24,.06) 30%, rgba(38,24,24,.12) 52%, rgba(38,24,24,.82) 100%);}
  .cover-cap{position:absolute;left:0;right:0;bottom:0;padding:15px 18px;color:#fff;}
  .cover-cap .c1{font-family:"Shippori Mincho B1",serif;font-size:24px;font-weight:800;line-height:1.1;text-shadow:0 1px 8px rgba(0,0,0,.4);}
  .cover-cap .c2{font-size:10.5px;opacity:.92;letter-spacing:2.4px;margin-top:3px;text-shadow:0 1px 6px rgba(0,0,0,.4);}

  /* sub-pestañas del día */
  .seg3{max-width:400px;}
  .seg3 button{font-size:12px;padding:8px 4px;gap:5px;}

  /* enlaces a maps */
  .maps{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px;}
  .maplink{font-size:11.5px;font-weight:700;color:var(--accent-deep);background:var(--soft);border-radius:99px;padding:7px 12px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
  .maplink:hover{background:#e7e3d8;}
  .tips a.inl,.desc a.inl{color:var(--accent-deep);font-weight:700;text-decoration:underline;}
  .route{list-style:none;counter-reset:r;margin:11px 0 2px;padding:0;}
  .route li{counter-increment:r;position:relative;padding:0 0 13px 32px;font-size:13px;color:var(--ink-soft);line-height:1.4;}
  .route li:not(:last-child)::after{content:"";position:absolute;left:10px;top:23px;bottom:1px;width:2px;background:var(--line);}
  .route li::before{content:counter(r);position:absolute;left:0;top:0;width:22px;height:22px;border-radius:50%;background:var(--indigo);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;}
  .leaflet-popup-content a{color:var(--accent-deep);font-weight:700;}

  /* conversor euro */
  .eur{font-weight:600;color:var(--muted);font-size:11px;}
  .exp-rate{display:flex;align-items:center;justify-content:flex-end;gap:6px;font-size:11px;color:var(--muted);margin-top:9px;}
  .exp-rate input{width:58px;text-align:right;font-family:inherit;font-size:12px;border:1px solid var(--line);border-radius:7px;padding:4px 6px;color:var(--ink);background:#fff;}
  .exp-catsel{display:flex;align-items:center;gap:9px;margin-top:11px;font-size:12px;font-weight:700;color:var(--ink-soft);}
  .catsel{flex:1;font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fff;color:var(--ink);}
  .catsel:focus{outline:none;border-color:var(--accent);}
</style>
</head>

/* cuenta atrás */
const TRIP_START=new Date(2026,6,25,0,0,0);
const pad=n=>String(n).padStart(2,"0");
function tick(){
  const wrap=document.getElementById("cdwrap"); if(!wrap) return;
  const dEl=document.getElementById("cd-days"), hEl=document.getElementById("cd-hms"), sub=document.getElementById("cd-sub");
  let ms=TRIP_START-new Date();
  if(ms<=0){ if(dEl)dEl.innerHTML="¡Ya!"; if(hEl)hEl.textContent=""; if(sub)sub.textContent="¡El viaje ha empezado! 🎉"; return; }
  const d=Math.floor(ms/86400000); ms-=d*86400000;
  const h=Math.floor(ms/3600000); ms-=h*3600000;
  const m=Math.floor(ms/60000); ms-=m*60000;
  const s=Math.floor(ms/1000);
  if(dEl)dEl.innerHTML=`${d} <small>${d===1?"día":"días"}</small>`;
  if(hEl)hEl.textContent=`${pad(h)} h ${pad(m)} m ${pad(s)} s`;
}

function summaryHTML(day){
  const real=DAYS.filter(d=>!d.prep&&!d.summary&&!d.lang);
  let doneStops=0,totalStops=0;
  real.forEach(d=>d.items.forEach(it=>{ if(it.type==="stop"){ totalStops++; if(isOn(it._id)) doneStops++; } }));
  const photoDays=real.filter(d=>getVal(d.id+"-foto"));
  const grand=tripTotal();
  const spends=real.map(d=>getExp(d).reduce((s,e)=>s+(+e.a||0),0));
  const maxSpend=Math.max(1,...spends);
  const chart=real.map((d,i)=>`<div class="spend-row"><span class="lab">${d.label.replace("Día","D")}</span><span class="track"><span class="barfill" style="width:${Math.round(spends[i]/maxSpend*100)}%"></span></span><span class="val">${fmtYen(spends[i])}</span></div>`).join("");
  const cards=real.map((d,i)=>{
    const rv=parseInt(getVal(d.id+"-rating")||"0",10);
    const hearts=[1,2,3,4,5].map(n=>n<=rv?"❤️":"🤍").join("");
    const mem=(d.memory||[]).map((lab,j)=>{ const v=getVal(d.id+"-rec-"+j); return v?`<div class="sm-mem"><b>${lab}:</b> ${escH(v)}</div>`:""; }).join("");
    return `<div class="sm-card">
      <div class="sm-head"><span class="sm-day">${d.label} · ${d.sub}</span><span class="sm-spent">${fmtYen(spends[i])}</span></div>

      <div class="sm-hearts">${rv?hearts:'<span class="sm-dim">sin valorar aún</span>'}</div>
      ${mem?`<div class="sm-mems">${mem}</div>`:""}
    </div>`;
  }).join("");
  const album = photoDays.length
    ? `<div class="gallery">${photoDays.map(d=>`<figure><img src="${getVal(d.id+'-foto')}" alt="${d.label}"><figcaption>${d.label}</figcaption></figure>`).join("")}</div>`
    : `<div class="gallery-empty">Aún no hay fotos. Añadidlas en el Diario de cada día y aparecerán aquí.</div>`;
  return `<section class="day show" id="resumen">
    <div class="intro"><div class="eyebrow">Fin del viaje</div><h2>Resumen del viaje</h2><div class="date">Vuestra aventura en Japón, día a día</div></div>

      <div class="sm-stat"><b>${photoDays.length}</b><span>fotos guardadas</span></div>
    </div>

function listProgress(it){ let d=0; it.list.forEach((_,i)=>{ if(isOn(it._id+"-"+i)) d++; }); return {done:d,total:it.list.length}; }
function countDone(day){
  let total=0,done=0;
  day.items.forEach(it=>{
    if(it.type==="stop"){ total++; if(isOn(it._id)) done++; }
    else if(it.type==="todo"){ it.list.forEach((_,i)=>{ total++; if(isOn(it._id+"-"+i)) done++; }); }
    else if(it.type==="pack" && day.prep){ it.list.forEach((_,i)=>{ total++; if(isOn(it._id+"-"+i)) done++; }); }
  });
  return {total,done};
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
let quizQ=null, quizAns=null, quizTurn="alyssa";
function newQuestion(){
  const correct=PHRASES[Math.floor(Math.random()*PHRASES.length)];
  const others=shuffle(PHRASES.filter(p=>p!==correct)).slice(0,3);
  const dir=Math.random()<0.5?"mean":"say";
  let prompt, opts;
  if(dir==="mean"){ prompt=`¿Qué significa <b>${correct.ro}</b>?`; opts=[correct,...others].map(p=>({text:p.es, ok:p===correct})); }
  else { prompt=`¿Cómo se dice <b>${correct.es}</b>?`; opts=[correct,...others].map(p=>({text:p.ro, ok:p===correct})); }
  shuffle(opts); quizQ={prompt,opts}; quizAns=null;

  const intro=`<div class="intro"><div class="eyebrow">${day.prep?"Antes de viajar":day.label}</div><h2>${day.title}</h2><div class="date">${day.date}</div><p class="quote">${day.quote}</p></div>`;
  const progress=`<div class="progress"><div class="bar"><div class="fill" style="width:${pct}%"></div></div><div class="lbl"><span>${day.prep?"Preparativos listos":"Vuestro progreso"}</span><span><b>${done}</b> / ${total} hechos</span></div></div>`;
  if(day.prep){
    const cover=COVER.indexOf("data:")===0?`<div class="cover"><img src="${COVER}" alt="Alyssa y Pol"><div class="cover-ov"></div><div class="cover-cap"><div class="c1">Alyssa ♡ Pol</div><div class="c2">NUESTRO VIAJE A JAPÓN · 2026</div></div></div>`:"";
    const cd=`<div class="cd" id="cdwrap"><div class="cd-lbl">Cuenta atrás</div><div class="cd-days" id="cd-days">·</div><div class="cd-hms" id="cd-hms"></div><div class="cd-sub" id="cd-sub">para vuestra aventura en Japón ✈️</div></div>`;
    const fact=`<div class="fact"><div class="ft">✨ ¿Sabíais que…?</div><p id="facttext">${FACTS[factIdx]}</p><button data-fact>Otro dato ✨</button></div>`;
    return `<section class="day show" id="${day.id}">${cover}${intro}${cd}${fact}${progress}<div class="list">${day.items.map(it=> it.type==="stop"?cardHTML(it):checklistHTML(it)).join("")}</div>${giftsHTML()}<p class="note">${day.note}</p></section>`;
  }
  const dv=dayView[day.id]||"plan";
  const subnav=`<div class="seg seg3">
    <button class="${dv==='plan'?'active':''}" data-dview="plan" data-day="${day.id}">🗺️ Plan</button>
    <button class="${dv==='gastos'?'active':''}" data-dview="gastos" data-day="${day.id}">💴 Gastos</button>
    <button class="${dv==='diario'?'active':''}" data-dview="diario" data-day="${day.id}">📔 Diario</button>
  </div>`;
  if(dv==='gastos'){
    return `<section class="day show" id="${day.id}">${intro}${subnav}${expensesHTML(day)}<p class="note">Apuntad lo que gastáis y se suma al total del viaje, en ¥ y en €.</p></section>`;
  }
  if(dv==='diario'){
    return `<section class="day show" id="${day.id}">${intro}${subnav}${journalHTML(day)}<p class="note">Vuestras fotos, recuerdos y valoración se guardan en este teléfono.</p></section>`;
  }
  const vm=viewMode[day.id]||"list";
  const planseg=`<div class="seg"><button class="${vm==='list'?'active':''}" data-view="list" data-day="${day.id}">📋 Lista</button><button class="${vm==='map'?'active':''}" data-view="map" data-day="${day.id}">🗺️ Mapa</button></div>`;
  if(vm==='map'){
    const cats=[...new Set(day.items.filter(it=>it.geo).map(it=>catVar(it.emoji)))];
    const legend=`<span><i style="background:#2c2a33"></i>Hotel</span>`+cats.map(c=>`<span><i style="background:${CATHEX[c]}"></i>${CATLBL[c]}</span>`).join("");
    return `<section class="day show" id="${day.id}">${intro}${progress}${subnav}${planseg}<div id="map-${day.id}" class="daymap"></div><div class="map-legend">${legend}</div><p class="note">El 🏨 hotel sale siempre como referencia. Toca un punto para ver el lugar, la hora y abrirlo en Google Maps.</p></section>`;
  }
  let body=""; day.items.forEach(it=>{ body += (it.type==="stop") ? cardHTML(it) : checklistHTML(it); });
  const ratings=day.ratings.map(r=>`<span>${r[0]} <b>${r[1]}</b></span>`).join("");
  return `<section class="day show" id="${day.id}">${intro}${progress}${subnav}${planseg}
    <div class="list">${body}</div>
    <div class="day-foot"><div class="ratings">${ratings}</div><div class="next"><b>Mañana →</b> ${day.next}</div><button class="reset" data-reset="${day.id}">Reiniciar marcas del día</button></div>
    <p class="note">Toca cada parada para ver los detalles y «Cómo llegar». Todo se guarda en este teléfono.</p>
  </section>`;
}

let current=0;
function render(){ buildTabs(); document.getElementById("main").innerHTML=buildDay(DAYS[current]); const d=DAYS[current]; if(!d.prep && !d.summary && !d.lang && (dayView[d.id]||"plan")==="plan" && (viewMode[d.id]||"list")==="map") initMap(d); tick(); }

function doExpand(tr){ const id=tr.getAttribute("data-expand"); const box=tr.closest(".card, .block"); open[id]=!open[id]; box.classList.toggle("open",open[id]); tr.setAttribute("aria-expanded",open[id]); }

function handlePhoto(file,id){
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image(); img.onload=()=>{
      const max=1100; let w=img.width,h=img.height;
      if(w>h&&w>max){ h=Math.round(h*max/w); w=max; } else if(h>=w&&h>max){ w=Math.round(w*max/h); h=max; }
      const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
      try{ setVal(id,c.toDataURL("image/jpeg",0.72)); }catch(err){} render();
    }; img.src=e.target.result; };
  reader.readAsDataURL(file);
}

document.addEventListener("click",e=>{
  const vv=e.target.closest("[data-view]");
  if(vv){ viewMode[vv.getAttribute("data-day")]=vv.getAttribute("data-view"); render(); return; }
  const dvb=e.target.closest("[data-dview]");
  if(dvb){ dayView[dvb.getAttribute("data-day")]=dvb.getAttribute("data-dview"); render(); document.getElementById("main").scrollIntoView({block:"start"}); return; }
  const ff=e.target.closest("[data-fact]");
  if(ff){ factIdx=(factIdx+1)%FACTS.length; const t=document.getElementById("facttext"); if(t) t.textContent=FACTS[factIdx]; return; }
  const sq=e.target.closest("[data-startquiz]"); if(sq){ newQuestion(); render(); return; }
  const an=e.target.closest("[data-ans]"); if(an){ if(quizAns) return; const i=+an.getAttribute("data-ans"); const ok=quizQ.opts[i].ok; quizAns={idx:i,ok}; if(ok){ const k="quiz-"+quizTurn; setVal(k,String(parseInt(getVal(k)||"0",10)+1)); } render(); return; }
  const nx=e.target.closest("[data-next]"); if(nx){ quizTurn=quizTurn==="alyssa"?"pol":"alyssa"; newQuestion(); render(); return; }
  const qr=e.target.closest("[data-quizreset]"); if(qr){ if(!confirm("¿Reiniciar el marcador de Alyssa y Pol?")) return; setVal("quiz-alyssa","0"); setVal("quiz-pol","0"); render(); return; }
  const ag=e.target.closest("[data-addgift]"); if(ag){ const t=document.getElementById("gift-t"), a=document.getElementById("gift-a"); const txt=(t.value||"").trim(); if(!txt){ t.focus(); return; } const amt=parseFloat((a.value||"").replace(",",".")); const arr=getGifts(); arr.push({t:txt, a:(amt&&amt>0)?amt:0, done:false}); setGifts(arr); render(); return; }
  const gd=e.target.closest("[data-giftdone]"); if(gd){ const arr=getGifts(); const i=+gd.getAttribute("data-giftdone"); if(arr[i]){ arr[i].done=!arr[i].done; setGifts(arr); render(); } return; }
  const xg=e.target.closest("[data-delgift]"); if(xg){ const arr=getGifts(); arr.splice(+xg.getAttribute("data-delgift"),1); setGifts(arr); render(); return; }
  const ax=e.target.closest("[data-addexp]");
  if(ax){ const d=DAYS.find(x=>x.id===ax.getAttribute("data-addexp"));
    const ci=document.getElementById("exp-c-"+d.id), ai=document.getElementById("exp-a-"+d.id), cs=document.getElementById("exp-cat-"+d.id);
    const amt=parseFloat((ai.value||"").replace(",","."));
    if(!amt||amt<=0){ ai.focus(); return; }
    const arr=getExp(d); arr.push({c:(ci.value||"").trim()||"Gasto", a:amt, cat:cs?cs.value:"otros"}); setExp(d,arr); render(); return; }
  const dx=e.target.closest("[data-delexp]");
  if(dx){ const d=DAYS.find(x=>x.id===dx.getAttribute("data-delexp")); const arr=getExp(d); arr.splice(+dx.getAttribute("data-idx"),1); setExp(d,arr); render(); return; }
  const ex=e.target.closest("[data-expand]"); if(ex){ doExpand(ex); return; }
  const rt=e.target.closest("[data-rate]"); if(rt){ setVal(rt.getAttribute("data-rate"),rt.getAttribute("data-val")); render(); return; }
  const rm=e.target.closest("[data-rmphoto]"); if(rm){ setVal(rm.getAttribute("data-rmphoto"),""); render(); return; }
  const t=e.target.closest("[data-toggle]"); if(t){ toggle(t.getAttribute("data-toggle")); render(); return; }
  const r=e.target.closest("[data-reset]"); if(r){
    if(!confirm("¿Reiniciar las marcas de este día? (Tus textos y fotos se mantienen)")) return;
    const day=DAYS.find(d=>d.id===r.getAttribute("data-reset"));
    day.items.forEach(it=>{ if(it.list) it.list.forEach((_,i)=>delete state[it._id+"-"+i]); else delete state[it._id]; });
    save(); render();
  }
});
document.addEventListener("input",e=>{ const f=e.target.closest("[data-field]"); if(f) setVal(f.getAttribute("data-field"),f.value); });
document.addEventListener("change",e=>{ const ph=e.target.closest("[data-photo]"); if(ph&&ph.files&&ph.files[0]) handlePhoto(ph.files[0],ph.getAttribute("data-photo")); const rf=e.target.closest('[data-field="eurrate"]'); if(rf) render(); });
document.addEventListener("keydown",e=>{ if((e.key==="Enter"||e.key===" ")&&e.target.matches("[data-expand]")){ e.preventDefault(); doExpand(e.target); } });

render(); tick(); setInterval(tick,1000);
</script>
</body>
</html>
